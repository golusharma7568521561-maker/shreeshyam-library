<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shree Shyam Library | v53.0 Complete</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --p: #4f46e5; --s: #db2777; --a: #0ea5e9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; overflow-x: hidden; }

        #bgWallpaper { 
            position: fixed; inset: 0; z-index: -2; 
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=2500&auto=format&fit=crop') center/cover no-repeat;
            filter: brightness(0.8) contrast(1.2);
        }
        #bgOverlay { position: fixed; inset: 0; z-index: -1; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(3px); }

        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
        .logo-jump { animation: jump 2s ease-in-out infinite; }

        .btn-premium {
            background: linear-gradient(135deg, var(--p), var(--s));
            color: white; font-weight: 800; border-radius: 1.2rem;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
            transition: 0.2s; border: none; cursor: pointer;
        }
        .btn-premium:active { transform: scale(0.95); }

        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5);
        }

        .seat {
            aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; font-weight: 800; cursor: pointer;
            border: 2px solid #e2e8f0; background: #fff; color: #64748b;
        }
        .seat.selected { background: var(--p) !important; color: white !important; border-color: var(--p); box-shadow: 0 0 15px var(--p); }
        .seat.occupied { background: #1e293b !important; color: #f1f5f9 !important; border: none; }
        
        .library-header { 
            position: fixed; top: 0; left: 0; right: 0; height: 70px; 
            background: rgba(255, 255, 255, 0.9); z-index: 1000; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 20px;
            border-bottom: 3px solid var(--p);
        }
    </style>
</head>
<body onload="initApp()">

    <div id="bgWallpaper"></div>
    <div id="bgOverlay"></div>

    <header class="library-header">
        <div class="flex items-center gap-2"><i class="fas fa-graduation-cap text-indigo-600 text-2xl"></i><span class="font-black text-slate-800 text-lg uppercase italic">Shree Shyam Library</span></div>
        <div onclick="checkAdmin()" class="cursor-pointer p-2"><i class="fas fa-fingerprint text-indigo-700 text-2xl"></i></div>
    </header>

    <div id="landing" class="min-h-screen flex flex-col items-center justify-center p-6 text-center pt-[80px]">
        <div class="mb-12 logo-jump">
            <h1 class="text-6xl font-black text-slate-900 leading-[0.9]">
                <span class="text-indigo-700">Shree</span><br>
                <span class="text-pink-600">Shyam</span><br>
                <span class="text-slate-800">Library</span>
            </h1>
        </div>
        <div class="flex flex-col gap-4 w-full max-w-xs">
            <button onclick="showStep('auth')" class="btn-premium py-5 text-xl uppercase tracking-tighter">Login Portal</button>
            <button onclick="showStep('reg')" class="bg-white border-2 border-indigo-100 py-4 text-[12px] font-black text-indigo-600 uppercase rounded-[1.2rem]">New Admission</button>
        </div>
    </div>

    <div id="auth" class="hidden min-h-screen flex flex-col items-center justify-center p-6 pt-[80px]">
        <button onclick="showStep('landing')" class="absolute top-[85px] left-8 text-slate-700"><i class="fas fa-arrow-left text-2xl"></i></button>
        <div class="glass-card w-full max-w-sm p-10 text-center">
            <h2 class="text-3xl font-black mb-8 text-indigo-900 uppercase italic">Login</h2>
            <input type="text" id="logID" placeholder="ID (SS-101)" class="w-full p-4 bg-slate-100 rounded-xl mb-4 font-bold uppercase">
            <input type="password" id="logOtp" placeholder="4-DIGIT PIN" class="w-full p-4 bg-slate-100 rounded-xl mb-8 font-bold" inputmode="numeric">
            <button onclick="doLogin()" class="btn-premium w-full py-5 text-sm uppercase">Verify & Enter</button>
        </div>
    </div>

    <div id="reg" class="hidden min-h-screen flex flex-col items-center justify-center p-6 pt-[120px]">
        <button onclick="showStep('landing')" class="absolute top-[85px] left-8 text-slate-700"><i class="fas fa-arrow-left text-2xl"></i></button>
        <div id="reg_form" class="glass-card w-full max-w-sm p-8">
            <h2 class="text-xl font-black mb-6 text-indigo-800 uppercase italic text-center underline">Admission Form</h2>
            <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 bg-slate-100 rounded-xl mb-4 font-bold">
            <div class="bg-indigo-50 p-4 rounded-xl border-2 border-dashed border-indigo-200 mb-4 text-center">
                <input type="file" id="regPhoto" class="text-[10px] text-indigo-600 font-bold" accept="image/*">
            </div>
            <p class="text-[10px] font-black text-pink-500 uppercase mb-2">Select Seat:</p>
            <div id="regSeatGrid" class="grid grid-cols-10 gap-2 mb-6 h-40 overflow-y-auto p-2 bg-slate-50 rounded-xl border"></div>
            <button onclick="handleRequest()" class="btn-premium w-full py-5 text-sm uppercase">Submit Now</button>
        </div>

        <div id="reg_result" class="hidden w-full flex flex-col items-center">
            <div id="waitingBox" class="glass-card p-12 text-center w-full max-w-sm border-t-8 border-pink-500">
                <i class="fas fa-hourglass-start text-pink-500 text-5xl mb-6"></i>
                <h3 class="text-xl font-black text-slate-900 uppercase">Verification Pending</h3>
                <p class="text-slate-500 text-xs mt-4">Admin will approve your seat soon.</p>
                <button onclick="location.reload()" class="mt-8 text-indigo-600 font-black text-[10px] uppercase underline">Refresh Status</button>
            </div>
            <div id="reg_card" class="hidden glass-card p-8 w-full max-w-sm text-center border-t-8 border-indigo-600">
                <div id="cardPic" class="w-24 h-24 rounded-2xl mx-auto mb-4 border-4 border-white shadow-lg overflow-hidden"></div>
                <div class="bg-indigo-900 p-6 rounded-[2rem] text-white">
                    <p class="text-[10px] font-bold opacity-70 uppercase mb-1">Membership ID</p>
                    <h2 id="cardID" class="text-4xl font-black"></h2>
                </div>
                <div class="flex justify-between mt-8 bg-slate-50 p-4 rounded-2xl">
                    <div class="text-left"><p class="text-[9px] text-slate-400 font-bold uppercase">Seat</p><b id="cardSeatDisp" class="text-indigo-700 text-xl"></b></div>
                    <div class="text-right"><p class="text-[9px] text-slate-400 font-bold uppercase">Pin</p><b id="cardOtp" class="text-slate-800 text-xl"></b></div>
                </div>
                <button onclick="showStep('auth')" class="btn-premium mt-8 w-full py-4 text-xs">GO TO LOGIN</button>
            </div>
        </div>
    </div>

    <main id="portal" class="hidden pt-[110px] px-4 max-w-4xl mx-auto pb-20">
        <div class="glass-card p-6 mb-8 flex justify-between items-center border-l-[8px] border-pink-500 shadow-xl">
            <div><p class="text-[10px] font-black text-pink-500 uppercase">Welcome back,</p><h3 id="uName" class="text-2xl font-black text-slate-900 italic">STUDENT</h3></div>
            <button onclick="location.reload()" class="w-12 h-12 bg-rose-100 text-rose-600 rounded-2xl"><i class="fas fa-power-off text-xl"></i></button>
        </div>
        <div class="glass-card p-8 text-center bg-white/90">
            <div id="portalGrid" class="grid grid-cols-5 sm:grid-cols-10 gap-3"></div>
        </div>
    </main>

    <div id="admin" class="fixed inset-0 z-[5000] hidden bg-slate-100 p-6 overflow-y-auto pt-[90px]">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl border">
                <h2 class="text-xl font-black uppercase text-indigo-900">Admin Controls</h2>
                <button onclick="location.reload()" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl font-black text-[10px] uppercase">Logout</button>
            </div>

            <div class="glass-card p-6 mb-8 bg-white border">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xs font-black text-indigo-700 uppercase">Library Layout</h3>
                    <div id="seatCounter" class="text-[10px] font-black text-white bg-indigo-600 px-3 py-1 rounded-full"></div>
                </div>
                <div id="adminSeatGrid" class="grid grid-cols-10 gap-2 mb-4 bg-slate-50 p-2 rounded-xl"></div>
                <p class="text-[9px] text-slate-400 font-bold uppercase">* Click to Manual Toggle</p>
            </div>

            <div class="glass-card p-6 mb-8 bg-white border border-pink-100">
                <h3 class="text-xs font-black text-pink-600 uppercase mb-4">Update Master Password</h3>
                <div class="flex gap-2">
                    <input type="text" id="newAdminPass" placeholder="Enter New Password" class="flex-1 p-3 bg-slate-100 rounded-xl font-bold text-xs">
                    <button onclick="updatePass()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">Save</button>
                </div>
            </div>

            <div id="adminList" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // JOD DIYA GAYA FIREBASE CODE
        const firebaseConfig = {
            apiKey: "AIzaSyALYVIKuQk3VKytlVkf881Wh80LB982Zu8",
            authDomain: "shreeshyam-lib.firebaseapp.com",
            databaseURL: "https://shreeshyam-lib-default-rtdb.firebaseio.com",
            projectId: "shreeshyam-lib",
            storageBucket: "shreeshyam-lib.firebasestorage.app",
            messagingSenderId: "490895903506",
            appId: "1:490895903506:web:607eaffc3484ad831441cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.core = { users: [], bookedSeats: [], pass: localStorage.getItem('ss_pass') || "shyam77" };
        window.session = JSON.parse(localStorage.getItem('ss_session_v53')) || { status: 'none', myID: null };
        window.selectedSeat = null;

        window.showStep = (id) => {
            ['landing','auth','reg','portal','admin'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'reg') renderSeatGrid('regSeatGrid');
            if(id === 'admin') { renderSeatGrid('adminSeatGrid', true); updateCounter(); }
        };

        window.renderSeatGrid = (containerID, isAdmin = false) => {
            const grid = document.getElementById(containerID); if(!grid) return; grid.innerHTML = '';
            for(let i=1; i<=50; i++) {
                const isBooked = core.bookedSeats.includes(i);
                const seat = document.createElement('div');
                seat.className = `seat ${isBooked ? 'occupied' : ''}`;
                seat.innerText = i;
                if(isAdmin) { seat.onclick = () => toggleSeatAdmin(i); }
                else if(!isBooked) {
                    seat.onclick = () => { 
                        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                        seat.classList.add('selected'); selectedSeat = i; 
                    };
                }
                grid.appendChild(seat);
            }
        };

        window.toggleSeatAdmin = (num) => {
            if(core.bookedSeats.includes(num)) {
                if(confirm("Seat " + num + " Khali karein?")) {
                    remove(ref(db, 'booked/' + num));
                    const u = core.users.find(usr => usr.seat == num);
                    if(u) remove(ref(db, 'users/' + u.id));
                }
            } else { if(confirm("Manual Book karein?")) set(ref(db, 'booked/' + num), true); }
        };

        window.handleRequest = () => {
            const name = document.getElementById('regName').value.trim();
            const photo = document.getElementById('regPhoto').files[0];
            if(!name || !photo || !selectedSeat) return alert("Pura form bharein!");
            const reader = new FileReader();
            reader.onload = (e) => {
                const newID = "SS-" + Math.floor(100 + Math.random() * 899);
                const newOtp = Math.floor(1000 + Math.random() * 9000).toString();
                const studentData = { id: newID, name: name, pic: e.target.result, otp: newOtp, status: 'pending', seat: selectedSeat };
                set(ref(db, 'users/' + newID), studentData);
                set(ref(db, 'booked/' + selectedSeat), true);
                localStorage.setItem('ss_session_v53', JSON.stringify({ status: 'pending', myID: newID }));
                location.reload();
            };
            reader.readAsDataURL(photo);
        };

        onValue(ref(db, 'users/'), (snap) => { core.users = snap.val() ? Object.values(snap.val()) : []; renderAdmin(); initApp(); });
        onValue(ref(db, 'booked/'), (snap) => { 
            core.bookedSeats = snap.val() ? Object.keys(snap.val()).map(Number) : []; 
            renderSeatGrid('regSeatGrid'); renderSeatGrid('adminSeatGrid', true); updateCounter();
        });

        window.approveNow = (id) => update(ref(db, 'users/' + id), { status: 'approved' });
        window.updatePass = () => {
            const p = document.getElementById('newAdminPass').value.trim();
            if(p) { core.pass = p; localStorage.setItem('ss_pass', p); alert("Password Saved!"); }
        };

        window.renderAdmin = () => {
            const list = document.getElementById('adminList'); if(!list) return;
            list.innerHTML = core.users.map(u => `
                <div class="bg-white p-4 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <img src="${u.pic}" class="w-10 h-10 rounded-xl object-cover border">
                        <div><p class="font-black text-xs uppercase">${u.name}</p><p class="text-[8px] text-pink-600 font-bold">Seat: ${u.seat} | ID: ${u.id}</p></div>
                    </div>
                    <div class="flex gap-2">
                        ${u.status === 'pending' ? `<button onclick="approveNow('${u.id}')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase">Approve</button>` : `<span class="text-[8px] font-black text-green-500 bg-green-50 px-2 py-1 rounded-lg">ACTIVE</span>`}
                    </div>
                </div>
            `).join('');
        };

        window.updateCounter = () => {
            const c = document.getElementById('seatCounter');
            if(c) c.innerText = `Full: ${core.bookedSeats.length} / 50`;
        };

        window.initApp = () => {
            if(session.status !== 'none') {
                showStep('reg'); document.getElementById('reg_form').classList.add('hidden');
                document.getElementById('reg_result').classList.remove('hidden');
                const me = core.users.find(u => u.id === session.myID);
                if(me && me.status === 'approved') {
                    document.getElementById('waitingBox').classList.add('hidden');
                    document.getElementById('reg_card').classList.remove('hidden');
                    document.getElementById('cardID').innerText = me.id;
                    document.getElementById('cardOtp').innerText = me.otp;
                    document.getElementById('cardSeatDisp').innerText = "#" + me.seat;
                    document.getElementById('cardPic').innerHTML = `<img src="${me.pic}" class="w-full h-full object-cover">`;
                }
            }
        };

        window.doLogin = () => {
            const id = document.getElementById('logID').value.trim().toUpperCase(), otp = document.getElementById('logOtp').value.trim();
            if(id === "BOSS-01" && otp === "0007") { showStep('portal'); document.getElementById('uName').innerText = "BOSS"; renderPortalGrid(0); return; }
            const me = core.users.find(u => u.id === id && u.otp === otp && u.status === 'approved');
            if(!me) return alert("Error: ID/PIN invalid!");
            showStep('portal'); document.getElementById('uName').innerText = me.name;
            renderPortalGrid(me.seat);
        };

        function renderPortalGrid(mySeat) {
            const pGrid = document.getElementById('portalGrid'); pGrid.innerHTML = '';
            for(let i=1; i<=50; i++) pGrid.innerHTML += `<div class="w-full aspect-square rounded-xl flex items-center justify-center font-black text-[11px] ${mySeat == i ? 'bg-indigo-700 text-white scale-110 shadow-xl' : 'bg-slate-50 text-slate-300 border'}">${i}</div>`;
        }

        window.checkAdmin = () => { if(prompt("Master Key:") === core.pass) showStep('admin'); };
    </script>
</body>
</html>
